---
# Ejercicio 1: Bastionado CIS Benchmark (nivel 1)
# Aplica controles básicos del CIS Benchmark para Ubuntu sobre target1.
# Conceptos: loop, when, register, set_fact, block/rescue, handlers, vars_files

- name: Bastionado CIS Benchmark nivel 1
  hosts: target1
  become: yes
  any_errors_fatal: false

  vars_files:
    - vars/cis_vars.yml       # Variables públicas (umask, límites, etc.)
    - vars/cis_vault.yml      # Contraseña de grub cifrada con Vault

  vars:
    cis_auditd_rules:
      - "-w /etc/passwd -p wa -k identity"
      - "-w /etc/shadow -p wa -k identity"
      - "-w /etc/sudoers -p wa -k sudoers"
      - "-a always,exit -F arch=b64 -S execve -k exec"
    cis_sysctl_params:
      - { key: "net.ipv4.ip_forward",              value: "0" }
      - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
      - { key: "net.ipv4.conf.all.rp_filter",      value: "1" }
      - { key: "kernel.randomize_va_space",         value: "2" }
    cis_disabled_services:
      - avahi-daemon
      - cups
      - isc-dhcp-server
      - nfs-server
      - rpcbind

  tasks:

    # ── 1. COMPROBACIÓN PREVIA ─────────────────────────────────────────────
    - name: Verificar que el sistema es Ubuntu/Debian
      assert:
        that: ansible_os_family == "Debian"
        fail_msg: "Este playbook solo soporta sistemas Debian/Ubuntu"

    - name: Recoger versión del kernel
      command: uname -r
      register: kernel_version
      changed_when: false

    - name: Mostrar sistema objetivo
      debug:
        msg: "Bastionando {{ inventory_hostname }} — kernel {{ kernel_version.stdout }}"

    # ── 2. PAQUETES DE AUDITORÍA ───────────────────────────────────────────
    - name: Instalar paquetes de auditoría y seguridad
      apt:
        name:
          - auditd
          - audispd-plugins
          - aide
          - libpam-pwquality
          - ufw
        state: present
        update_cache: yes

    # ── 3. DESHABILITAR SERVICIOS INNECESARIOS ─────────────────────────────
    - name: Deshabilitar servicios no necesarios (CIS 2.x)
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop: "{{ cis_disabled_services }}"
      ignore_errors: yes    # El servicio puede no estar instalado

    # ── 4. PARÁMETROS DE KERNEL (sysctl) ──────────────────────────────────
    - name: Aplicar parámetros de red seguros (CIS 3.x)
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
        sysctl_file: /etc/sysctl.d/99-cis.conf
      loop: "{{ cis_sysctl_params }}"

    # ── 5. POLÍTICA DE CONTRASEÑAS (PAM) ──────────────────────────────────
    - name: Configurar política de contraseñas (CIS 5.4)
      lineinfile:
        path: /etc/security/pwquality.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^#?minlen",   line: "minlen = 14" }
        - { regexp: "^#?dcredit",  line: "dcredit = -1" }
        - { regexp: "^#?ucredit",  line: "ucredit = -1" }
        - { regexp: "^#?lcredit",  line: "lcredit = -1" }
        - { regexp: "^#?ocredit",  line: "ocredit = -1" }

    - name: Configurar expiración de contraseñas (CIS 5.4.1)
      lineinfile:
        path: /etc/login.defs
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^PASS_MAX_DAYS", line: "PASS_MAX_DAYS 90" }
        - { regexp: "^PASS_MIN_DAYS", line: "PASS_MIN_DAYS 7"  }
        - { regexp: "^PASS_WARN_AGE", line: "PASS_WARN_AGE 14" }

    # ── 6. REGLAS DE AUDITORÍA ─────────────────────────────────────────────
    - name: Desplegar reglas de auditd (CIS 4.x)
      copy:
        dest: /etc/audit/rules.d/99-cis.rules
        mode: '0600'
        content: "{{ cis_auditd_rules | join('\n') }}\n"
      notify: Recargar auditd

    # ── 7. FIREWALL BASE ───────────────────────────────────────────────────
    - name: Denegar todo el tráfico entrante por defecto
      ufw:
        default: deny
        direction: incoming

    - name: Permitir SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Habilitar firewall (CIS 3.5)
      ufw:
        state: enabled

    # ── 8. SSH HARDENING ───────────────────────────────────────────────────
    - name: Endurecer configuración de SSH (CIS 5.2)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        validate: "sshd -t -f %s"
      loop:
        - { regexp: "^#?PermitRootLogin",      line: "PermitRootLogin no"        }
        - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
        - { regexp: "^#?MaxAuthTries",         line: "MaxAuthTries 4"            }
        - { regexp: "^#?LoginGraceTime",       line: "LoginGraceTime 60"         }
        - { regexp: "^#?ClientAliveInterval",  line: "ClientAliveInterval 300"   }
        - { regexp: "^#?ClientAliveCountMax",  line: "ClientAliveCountMax 3"     }
      notify: Recargar SSH

    # ── 9. PERMISOS EN FICHEROS CRÍTICOS ──────────────────────────────────
    - name: Asegurar permisos en ficheros sensibles (CIS 6.x)
      file:
        path: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/passwd,  owner: root, group: root, mode: '0644' }
        - { path: /etc/shadow,  owner: root, group: shadow, mode: '0640' }
        - { path: /etc/gshadow, owner: root, group: shadow, mode: '0640' }
        - { path: /etc/group,   owner: root, group: root, mode: '0644' }

    # ── 10. INICIALIZAR AIDE (IDS de ficheros) ─────────────────────────────
    - name: Inicializar base de datos AIDE
      block:
        - name: Comprobar si ya existe la base de datos de AIDE
          stat:
            path: /var/lib/aide/aide.db
          register: aide_db

        - name: Inicializar AIDE (solo si no existe la BD)
          command: aide --init
          when: not aide_db.stat.exists
          async: 300
          poll: 10

        - name: Activar base de datos de AIDE
          copy:
            src: /var/lib/aide/aide.db.new
            dest: /var/lib/aide/aide.db
            remote_src: yes
          when: not aide_db.stat.exists

      rescue:
        - name: Advertir si AIDE falló (no detiene el playbook)
          debug:
            msg: "AIDE no pudo inicializarse. Revisa el estado manualmente."

  handlers:
    - name: Recargar auditd
      service:
        name: auditd
        state: restarted

    - name: Recargar SSH
      service:
        name: ssh
        state: reloaded
