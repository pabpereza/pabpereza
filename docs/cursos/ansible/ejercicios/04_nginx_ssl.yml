---
# Ejercicio 4: nginx con certificados TLS (autofirmados o Let's Encrypt)
# Instala nginx en target2, genera certificados y configura HTTPS.
# Conceptos: set_fact, register, when, block/rescue, handlers, loop,
#             stat (idempotencia manual), assert, notify

- name: Nginx con TLS en target2
  hosts: target2
  become: yes

  vars_files:
    - vars/ssl_vars.yml   # domain, cert_mode, contact_email

  vars:
    # cert_mode puede ser "selfsigned" o "letsencrypt"
    cert_mode: selfsigned
    domain: "target2.local"
    ssl_dir: /etc/ssl/ansible
    nginx_dir: /etc/nginx
    web_root: /var/www/{{ domain }}
    php_version: "8.1"

  tasks:

    # ── 1. VALIDACIONES PREVIAS ───────────────────────────────────────────
    - name: Verificar modo de certificado válido
      assert:
        that: cert_mode in ['selfsigned', 'letsencrypt']
        fail_msg: "cert_mode debe ser 'selfsigned' o 'letsencrypt', recibido: {{ cert_mode }}"

    - name: Verificar que hay dominio definido
      assert:
        that: domain is defined and domain | length > 0
        fail_msg: "La variable 'domain' es obligatoria"

    # ── 2. INSTALACIÓN DE PAQUETES ────────────────────────────────────────
    - name: Actualizar índice de paquetes
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar nginx y openssl
      apt:
        name:
          - nginx
          - openssl
        state: present

    - name: Instalar certbot (solo si modo letsencrypt)
      apt:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
      when: cert_mode == "letsencrypt"

    # ── 3. USUARIO Y DIRECTORIOS ──────────────────────────────────────────
    - name: Crear usuario nginx
      user:
        name: nginx
        shell: /usr/sbin/nologin
        system: yes

    - name: Crear directorios necesarios
      file:
        path: "{{ item }}"
        state: directory
        owner: nginx
        group: www-data
        mode: '0755'
      loop:
        - "{{ ssl_dir }}"
        - "{{ web_root }}"

    # ── 4. GESTIÓN DE CERTIFICADOS ────────────────────────────────────────
    - name: Bloque de certificado autofirmado
      block:
        - name: Comprobar si ya existe el certificado
          stat:
            path: "{{ ssl_dir }}/{{ domain }}.crt"
          register: cert_stat

        - name: Generar clave privada y certificado autofirmado
          command: >
            openssl req -x509 -nodes
            -days 365
            -newkey rsa:2048
            -keyout {{ ssl_dir }}/{{ domain }}.key
            -out {{ ssl_dir }}/{{ domain }}.crt
            -subj "/CN={{ domain }}/O=Ansible Lab/C=ES"
          when: not cert_stat.stat.exists
          notify: Recargar nginx

        - name: Asegurar permisos estrictos en la clave privada
          file:
            path: "{{ ssl_dir }}/{{ domain }}.key"
            owner: root
            group: root
            mode: '0600'

      when: cert_mode == "selfsigned"

    - name: Bloque de certificado Let's Encrypt
      block:
        - name: Comprobar si ya existe el certificado de Let's Encrypt
          stat:
            path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
          register: le_cert_stat

        - name: Obtener certificado con certbot
          command: >
            certbot certonly --nginx
            -d {{ domain }}
            --non-interactive
            --agree-tos
            --email {{ contact_email }}
          when: not le_cert_stat.stat.exists
          notify: Recargar nginx

        - name: Apuntar variables al certificado de Let's Encrypt
          set_fact:
            ssl_cert_path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
            ssl_key_path:  "/etc/letsencrypt/live/{{ domain }}/privkey.pem"

        - name: Configurar renovación automática
          cron:
            name: "certbot renew"
            job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
            minute: "0"
            hour: "3"
            weekday: "1"

      when: cert_mode == "letsencrypt"

      rescue:
        - name: Advertir fallo en Let's Encrypt y continuar con autofirmado
          debug:
            msg: >
              Let's Encrypt falló (¿dominio no resolvible?).
              Fallback a certificado autofirmado.

        - name: Forzar modo autofirmado como fallback
          set_fact:
            cert_mode: selfsigned

    # ── Normalizar rutas de certificado ───────────────────────────────────
    - name: Establecer rutas de certificado para nginx
      set_fact:
        ssl_cert_path: "{{ ssl_dir }}/{{ domain }}.crt"
        ssl_key_path:  "{{ ssl_dir }}/{{ domain }}.key"
      when: cert_mode == "selfsigned"

    # ── 5. PARÁMETROS DH ──────────────────────────────────────────────────
    - name: Comprobar si ya existe el fichero DH
      stat:
        path: "{{ ssl_dir }}/dhparam.pem"
      register: dhparam_stat

    - name: Generar parámetros Diffie-Hellman 2048 bits (tarda ~1 min)
      command: openssl dhparam -out {{ ssl_dir }}/dhparam.pem 2048
      when: not dhparam_stat.stat.exists
      async: 120
      poll: 10

    # ── 6. CONFIGURACIÓN DE NGINX ─────────────────────────────────────────
    - name: Página de prueba
      copy:
        dest: "{{ web_root }}/index.html"
        owner: nginx
        group: www-data
        mode: '0644'
        content: |
          <!DOCTYPE html>
          <html>
            <head><title>{{ domain }}</title></head>
            <body><h1>Ansible + TLS funcionando en {{ domain }}</h1></body>
          </html>

    - name: Configurar nginx con TLS y hardening de headers
      copy:
        dest: "{{ nginx_dir }}/sites-available/{{ domain }}"
        mode: '0644'
        content: |
          server {
              listen 80;
              server_name {{ domain }};
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name {{ domain }};

              root {{ web_root }};
              index index.html;

              # Certificado
              ssl_certificate     {{ ssl_cert_path }};
              ssl_certificate_key {{ ssl_key_path }};
              ssl_dhparam         {{ ssl_dir }}/dhparam.pem;

              # Protocolos y cifrados seguros (Mozilla Intermediate)
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
              ssl_prefer_server_ciphers off;

              # Sesión TLS
              ssl_session_timeout 1d;
              ssl_session_cache   shared:SSL:10m;
              ssl_stapling        on;
              ssl_stapling_verify on;

              # Headers de seguridad
              add_header Strict-Transport-Security "max-age=63072000" always;
              add_header X-Frame-Options DENY;
              add_header X-Content-Type-Options nosniff;
              add_header Referrer-Policy "no-referrer-when-downgrade";

              location / {
                  try_files $uri $uri/ =404;
              }
          }
      notify: Recargar nginx

    - name: Activar sitio
      file:
        src: "{{ nginx_dir }}/sites-available/{{ domain }}"
        dest: "{{ nginx_dir }}/sites-enabled/{{ domain }}"
        state: link
      notify: Recargar nginx

    - name: Desactivar sitio default de nginx
      file:
        path: "{{ nginx_dir }}/sites-enabled/default"
        state: absent
      notify: Recargar nginx

    # ── 7. FIREWALL ───────────────────────────────────────────────────────
    - name: Permitir tráfico HTTP y HTTPS
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"

    # ── 8. ARRANCAR SERVICIOS ─────────────────────────────────────────────
    - name: Arrancar y habilitar nginx
      service:
        name: nginx
        state: started
        enabled: yes

    # ── 9. VERIFICACIÓN FINAL ─────────────────────────────────────────────
    - name: Comprobar que nginx responde en HTTPS
      uri:
        url: "https://{{ domain }}"
        validate_certs: no   # Autofirmado no pasa validación de CA
        status_code: 200
      register: https_check
      retries: 3
      delay: 5
      until: https_check.status == 200

    - name: Mostrar resultado
      debug:
        msg: "nginx con TLS ({{ cert_mode }}) activo en https://{{ domain }}"

  handlers:
    - name: Recargar nginx
      service:
        name: nginx
        state: reloaded
