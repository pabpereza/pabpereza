---
# Ejercicio 3: Backups automatizados de base de datos
# Genera backups de MariaDB en target3, los comprime, los rota y los transfiere
# a target1 como nodo de almacenamiento.
# Conceptos: múltiples plays, register, set_fact, when, block/rescue/always,
#             changed_when, failed_when, loop, fetch, assert

# ── PLAY 1: Generar y rotar backups en target3 ───────────────────────────
- name: Backup de MariaDB en target3
  hosts: target3
  become: yes

  vars_files:
    - vars/db_vault.yml   # db_root_password cifrado con Vault

  vars:
    backup_dir: /var/backups/mysql
    backup_retention_days: 7
    databases_to_backup:
      - wordpress
      - mysql        # catálogo interno, siempre útil
    timestamp: "{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}"

  tasks:

    # ── COMPROBACIONES PREVIAS ────────────────────────────────────────────
    - name: Verificar que MariaDB está corriendo
      service:
        name: mariadb
        state: started
      register: mariadb_state

    - name: Comprobar espacio disponible en disco
      shell: "df -BM {{ backup_dir | dirname }} | awk 'NR==2 {gsub(/M/,\"\"); print $4}'"
      register: disk_free_mb
      changed_when: false

    - name: Abortar si hay menos de 500 MB libres
      assert:
        that: disk_free_mb.stdout | int > 500
        fail_msg: "Espacio insuficiente: {{ disk_free_mb.stdout }} MB libres"

    # ── PREPARACIÓN ───────────────────────────────────────────────────────
    - name: Crear usuario de sistema para backups
      user:
        name: backup_agent
        shell: /usr/sbin/nologin
        system: yes

    - name: Crear directorio de backups
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: backup_agent
        group: backup_agent
        mode: '0750'

    - name: Instalar dependencias
      apt:
        name:
          - python3-pymysql
          - gzip
        state: present
        update_cache: yes

    # ── GENERACIÓN DE BACKUPS ─────────────────────────────────────────────
    - name: Hacer dump de cada base de datos
      block:
        - name: Ejecutar mysqldump
          shell: >
            mysqldump
            --user=root
            --password={{ db_root_password }}
            --single-transaction
            --routines
            --triggers
            {{ item }}
            | gzip > {{ backup_dir }}/{{ item }}_{{ timestamp }}.sql.gz
          loop: "{{ databases_to_backup }}"
          no_log: true    # No exponer la contraseña en los logs
          register: dump_results

        - name: Verificar que los ficheros de backup existen y no están vacíos
          stat:
            path: "{{ backup_dir }}/{{ item }}_{{ timestamp }}.sql.gz"
          register: backup_files
          loop: "{{ databases_to_backup }}"
          failed_when:
            - not backup_files.stat.exists or backup_files.stat.size == 0

      rescue:
        - name: Notificar fallo en el backup
          debug:
            msg: "ERROR: El backup de {{ inventory_hostname }} falló. Revisar logs de MariaDB."

      always:
        - name: Registrar resultado del backup en log local
          lineinfile:
            path: "{{ backup_dir }}/backup.log"
            line: "{{ timestamp }} — {{ 'OK' if dump_results is not failed else 'FAILED' }}"
            create: yes

    # ── ROTACIÓN ──────────────────────────────────────────────────────────
    - name: Eliminar backups con más de {{ backup_retention_days }} días
      find:
        paths: "{{ backup_dir }}"
        patterns: "*.sql.gz"
        age: "{{ backup_retention_days }}d"
      register: old_backups

    - name: Borrar ficheros obsoletos
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"
      when: old_backups.matched > 0

    - name: Mostrar resumen de rotación
      debug:
        msg: "Eliminados {{ old_backups.matched }} backups con más de {{ backup_retention_days }} días"

    # ── INVENTARIO DE BACKUPS ─────────────────────────────────────────────
    - name: Listar backups actuales
      find:
        paths: "{{ backup_dir }}"
        patterns: "*.sql.gz"
      register: current_backups

    - name: Guardar lista de backups como fact
      set_fact:
        backup_file_list: "{{ current_backups.files | map(attribute='path') | list }}"

    - name: Mostrar backups disponibles
      debug:
        msg: "{{ backup_file_list }}"


# ── PLAY 2: Transferir backups a nodo de almacenamiento (target1) ─────────
- name: Transferir backups al nodo de almacenamiento
  hosts: target1
  become: yes

  vars:
    backup_dir_remote: /var/backups/mysql          # En target3
    backup_dir_local: /var/backups/mysql_remote    # En target1

  tasks:

    - name: Crear directorio de almacenamiento en target1
      file:
        path: "{{ backup_dir_local }}"
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Descargar backups de target3 al nodo de control
      fetch:
        src: "{{ item }}"
        dest: "/tmp/ansible_backups/"
        flat: no
      delegate_to: target3
      loop: "{{ hostvars['target3']['backup_file_list'] }}"
      when: hostvars['target3']['backup_file_list'] is defined

    - name: Copiar backups del nodo de control a target1
      copy:
        src: "/tmp/ansible_backups/target3{{ item }}"
        dest: "{{ backup_dir_local }}/"
        mode: '0640'
      loop: "{{ hostvars['target3']['backup_file_list'] }}"
      when: hostvars['target3']['backup_file_list'] is defined

    - name: Verificar integridad — comprobar que los .gz no están corruptos
      shell: "gzip -t {{ backup_dir_local }}/{{ item | basename }}"
      register: integrity_check
      changed_when: false
      failed_when: integrity_check.rc != 0
      loop: "{{ hostvars['target3']['backup_file_list'] }}"
      when: hostvars['target3']['backup_file_list'] is defined

    - name: Resumen final
      debug:
        msg: >
          Backup completado. {{ hostvars['target3']['backup_file_list'] | length }}
          ficheros transferidos a {{ inventory_hostname }}:{{ backup_dir_local }}
